### Model
model_name_or_path: meta-llama/Llama-3-8B

### Method
finetune_type: lora
lora_rank: 64
lora_alpha: 128
lora_target: all

### Dataset
dataset: /tmp/data.json
template: default
cutoff_len: 2048

### Training
per_device_train_batch_size: 16
gradient_accumulation_steps: 1
learning_rate: 0.0002
num_train_epochs: 3
warmup_ratio: 0.1
lr_scheduler_type: cosine
fp16: true

### Output
output_dir: ./finetune_output
logging_steps: 10
save_steps: 500
save_total_limit: 3
