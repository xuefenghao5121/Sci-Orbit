version: "1.0"
created: "2026-04-01"

test_cases:
  - id: TC001
    name: "Basic Environment Collection"
    category: "env_snapshot"
    difficulty: easy
    description: "Collect environment info and verify key fields"
    instruction: "Collect complete environment snapshot"
    ground_truth:
      required_fields:
        - hostname
        - os
        - kernel
        - cpu
        - ram_total_gb
        - python.version
        - python.path
    scoring:
      - criterion: "All required fields exist"
        weight: 100

  - id: TC005
    name: "VASP Metal Parameter Inference"
    category: "param_complete"
    difficulty: medium
    description: "Given Cu VASP calculation, infer ismear=1, sigma=0.2"
    instruction: "Complete VASP params for Cu system"
    ground_truth:
      explicit_params:
        tool: "vasp_dft"
        params: { system: "Cu", encut: 500 }
      expected_implicit:
        ismear: 1
        sigma: 0.2
    scoring:
      - criterion: "Infer ismear=1"
        weight: 50
      - criterion: "Infer sigma=0.2"
        weight: 50
